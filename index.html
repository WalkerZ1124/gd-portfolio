<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

        /* ── cursor ── */
        #cursor {
            width: 14px; height: 14px;
            background: rgba(45,212,191,0.7);
            border: 1.5px solid #2dd4bf;
            position: fixed; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%,-50%);
            mix-blend-mode: screen;
        }

        /* ── home video ── */
        .home-wrap {
            width: 100vw; height: 100vh;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .home-wrap video {
            width: 100%; height: 100%;
            object-fit: contain; display: block;
        }
        .banner-link-layer {
            position: absolute; inset: 0; pointer-events: none;
        }
        .banner-nav-link {
            position: absolute; pointer-events: auto;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            background: rgba(8,12,20,0.45);
            color: rgba(255,255,255,0.9);
            font-size: clamp(0.7rem,1.3vw,1rem);
            font-weight: 800; letter-spacing: 0.08em;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            transform: translate(-50%,-50%);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, background 0.2s;
            border: none; outline: none;
        }
        .banner-nav-link:hover {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.7);
            transform: translate(-50%,-50%) scale(1.07);
        }
        .banner-nav-link.design { left: 34%; top: 52%; }
        .banner-nav-link.coding { left: 56.5%; top: 67%; }
        .banner-nav-link.other  { left: 58.5%; top: 45%; }

        /* ── backdrop dim ── */
        #backdrop {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.5);
            opacity: 0; pointer-events: none;
            transition: opacity 0.35s ease;
        }
        #backdrop.visible { opacity: 1; pointer-events: auto; }

        /* ── category panel (right 2/3) ── */
        #cat-panel {
            position: fixed; top: 0; right: 0;
            width: 67vw; height: 100vh;
            z-index: 200;
            background: transparent;
            display: flex; flex-direction: column;
            opacity: 0;
            transform: scale(0.97);
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.16,1,0.3,1), transform 0.4s cubic-bezier(0.16,1,0.3,1);
            overflow: hidden;
        }
        #cat-panel.open { opacity: 1; transform: scale(1); pointer-events: auto; }

        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 28px 36px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .panel-category-label {
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 0.18em; text-transform: uppercase;
        }
        .panel-title {
            font-size: 2rem; font-weight: 900; color: #fff;
            line-height: 1;
        }
        .close-btn {
            width: 36px; height: 36px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
        }
        .close-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* ── carousel ── */
        .carousel-area {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; overflow: hidden;
            padding: 32px 0;
        }
        .carousel-row {
            display: flex; align-items: center; gap: 0;
            padding: 0 20px;
            position: relative;
        }
        .carousel-track-wrap {
            flex: 1; overflow: hidden;
            position: relative;
        }
        .carousel-track {
            display: flex;
            align-items: center;
            transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
        }
        /* Each slide occupies 62% of track — the neighbouring cards peek
           in on both sides. The slide is a flex box so the card can be
           capped and centered, leaving comfortable margins all around. */
        .carousel-slide {
            min-width: 62%;
            padding: 0 18px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
        }
        .project-thumb {
            width: 100%;
            max-width: 460px;
            max-height: 66vh;
            margin: 0 auto;
            background: #111827;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            aspect-ratio: 6 / 5;
            transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
        }
        .project-thumb:hover {
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-3px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        .thumb-img {
            width: 100%; aspect-ratio: 16/9;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            background: #0d1117;
            flex-shrink: 0;
            overflow: hidden;
        }
        .thumb-img video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-body {
            padding: 20px 24px 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }
        .thumb-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            padding: 3px 10px; border-radius: 999px;
            font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
        }
        .thumb-title {
            font-size: 1.15rem; font-weight: 800; color: #fff; margin-bottom: 6px;
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
        }
        .thumb-desc {
            font-size: 0.85rem; color: rgba(255,255,255,0.4); line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .thumb-cta {
            margin-top: auto;
            padding-top: 18px;
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em;
            text-transform: uppercase;
            width: fit-content;
        }
        .thumb-cta-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid currentColor;
            transition: background 0.2s;

        .thumb-cta-btn:hover { background: rgba(255,255,255,0.07); }

        /* arrow buttons */
        .arrow-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            z-index: 2;
        }
        .arrow-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.08); }
        .arrow-btn:disabled { opacity: 0.2; cursor: default; transform: none; }

        /* dots */
        .dots-row {
            display: flex; gap: 6px; justify-content: center;
            padding: 16px 0 0;
            flex-shrink: 0;
        }
        .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(255,255,255,0.18);
            transition: background 0.25s, width 0.25s;
            cursor: pointer;
        }
        .dot.active {
            width: 20px; border-radius: 3px;
        }

        /* ── project detail overlay ── */
        #detail-overlay {
            position: fixed; inset: 0; z-index: 500;
            background: #080c14;
            opacity: 0; pointer-events: none;
            overflow-y: auto;
            transition: opacity 0.3s ease;
        }

        .detail-inner {
            max-width: 820px; margin: 0 auto;
            padding: 80px 40px 60px;
        }
        .detail-back {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 0.82rem; color: rgba(255,255,255,0.45);
            cursor: pointer; margin-bottom: 36px;
            background: none; border: none;
            transition: color 0.2s;

        .detail-back:hover { color: #fff; }
        .detail-img {
            width: 100%; aspect-ratio: 16/9;
            border-radius: 16px; overflow: hidden;
            margin-bottom: 32px;
            display: flex; align-items: center; justify-content: center;

        .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .detail-title { font-size: 2.2rem; font-weight: 900; color: #fff; margin-bottom: 12px; line-height: 1.1; }

        /* trailer under the title */
        .detail-trailer {
            width: 100%; aspect-ratio: 16/9;
            border-radius: 16px; overflow: hidden;
            margin: 8px 0 32px;
            background: #000;
        }
        .detail-trailer video { width: 100%; height: 100%; object-fit: contain; display: block; background:#000; }
        .detail-trailer iframe { width: 100%; height: 100%; display: block; border: 0; }

        .detail-desc { font-size: 1rem; color: rgba(255,255,255,0.5); line-height: 1.8; }

        /* section heading hierarchy inside the write-up */
        .d-h2 {
            display: block;
            font-size: 1.5rem; font-weight: 900; color: #fff;
            line-height: 1.2;
            margin: 44px 0 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .d-h3 {
            display: block;
            font-size: 1.12rem; font-weight: 800; color: #e8e8ef;
            line-height: 1.3;
            margin: 30px 0 8px;
        }
        .detail-desc > p:first-child { margin-top: 0; }

        /* boss encounter looping clip (behaves like a gif — silent, looping) */
        .detail-gif {
            width: 100%; border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            background: #0d1117;
            margin: 18px 0 26px;
            display: block;
        }
        .detail-gif video { width: 100%; display: block; }

        /* credits table */
        .credits-table {
            width: 100%; border-collapse: collapse;
            margin: 6px 0 26px;
            font-size: 0.92rem;
        }
        .credits-table th {

            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em;
            text-transform: uppercase; color: rgba(255,255,255,0.35);
            padding: 0 16px 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }
        .credits-table td {

            vertical-align: top;
        }
        .credits-table td:first-child { color: #fff; font-weight: 600; white-space: nowrap; }
        .credits-table td:last-child { color: rgba(255,255,255,0.5); }

        /* level images embedded inside the write-up */
        .detail-desc figure { margin: 18px 0 26px; }
        .detail-desc figure img {

            border: 1px solid rgba(255,255,255,0.08);
            background: #0d1117;
        }
        .detail-desc figure figcaption {
            margin-top: 8px;
            font-size: 0.78rem; letter-spacing: 0.04em;
            color: rgba(255,255,255,0.35);
            text-align: center;

        .detail-fig-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
            margin: 18px 0 26px;
        }
        .detail-fig-grid figure { margin: 0; }
        @media (max-width: 640px) { .detail-fig-grid { grid-template-columns: 1fr; } }
        .detail-links { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
        .detail-link {
            padding: 10px 22px; border-radius: 10px;
            font-size: 0.85rem; font-weight: 700; letter-spacing: 0.04em;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.8);
            cursor: pointer; text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .detail-link:hover { background: rgba(255,255,255,0.12); color: #fff; }

        /* section divider inside detail */
        .detail-section-title {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em;

        /* noise texture */
        .noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            position: fixed; inset: 0; pointer-events: none; z-index: 1;
        }

        @media (max-width: 768px) {
            #cat-panel { width: 100vw; }
            .panel-title { font-size: 1.5rem; }
            .carousel-slide { min-width: 90%; }
            .detail-inner { padding: 60px 20px 40px; }
            .detail-title { font-size: 1.6rem; }
        }

<script>
/* ── Data ── */
const CATEGORIES = {
    'game-design': {
        num: '01',
        label: 'Game Design',
        accent: '#a78bfa',
        tagStyle: 'background:rgba(139,92,246,0.12);color:#a78bfa;border:1px solid rgba(139,92,246,0.25)',
        projects: [
            {
                emoji: '⛏️',
                imgBg: 'linear-gradient(135deg,#1f1030 0%,#0d0f1a 100%)',
                cover: 'Asset/Video/CC-cover.mp4',
                trailer: 'Asset/Video/Trailer_20260405.mp4',
                tags: ['VR', 'Level Design', 'Enemy Design', 'Unity'],
                title: 'Crossworld Chronicles',
                desc: 'An asymmetric co-op VR dungeon crawler — one player fights inside the dungeon while the other commands from above.',
                fullDesc:
`<strong class="d-h2">Overview</strong>
Game Designer · Team of 8 · 3 months · PC VR · Unity · Client: Coal Car Studio

I was the only game designer on the team. I led level design and enemy design, and contributed to systems design within the framework set by our client. The general direction came from the client's brief, but turning an abstract requirement like "two-player asymmetric co-op" into a game people can actually play means answering a long list of concrete questions — why would these two roles ever need each other, how should the map guide players through it, how fast should enemies move and where should they come from. I designed the structure of all three levels and the enemy behavior model, and every combat and resource value was locked in only after several rounds of playtesting.

<strong class="d-h2">The Design Challenge</strong>
How do you make two players with completely different gameplay actually need each other? Get it wrong, and you end up with the classic failure of asymmetric design: two people in the same room playing two games that have nothing to do with each other.

The two roles experience the game in completely different ways — the Explorer down inside the dungeon, the Strategist looking down from above — both while exploring the level and in the middle of combat.

<div class="detail-fig-grid"><figure><img src="Asset/Picture/CC/User%20Flow/explorer-in%20level.png" alt="Explorer in level"><figcaption>Explorer · In Level</figcaption></figure><figure><img src="Asset/Picture/CC/User%20Flow/strategist-in%20level.png" alt="Strategist in level"><figcaption>Strategist · In Level</figcaption></figure><figure><img src="Asset/Picture/CC/User%20Flow/explorer-in%20combat.png" alt="Explorer in combat"><figcaption>Explorer · In Combat</figcaption></figure><figure><img src="Asset/Picture/CC/User%20Flow/strategist-in%20combat.png" alt="Strategist in combat"><figcaption>Strategist · In Combat</figcaption></figure></div>

Our first concept had players alternating between puzzle-solving and combat — while one solved a puzzle, the other fought to protect them, FPS-style versus tower-defense-style. The client made it clear they didn't want puzzles, and the concept was cut. The problem surfaced immediately in our first playtest without it: the Explorer could clear an entire encounter alone, leaving the Strategist with nothing to do. Cooperation simply did not exist in the numbers.

<strong class="d-h3">The fix: writing dependency into the values</strong>
We reduced the Explorer's damage so he could no longer beat enemies alone, and strengthened the towers so the Strategist's decisions actually shaped the fight. To balance that, we throttled his resources: passive mana regen is only 0.5/sec, and a tower costs 5 mana — roughly ten seconds per tower alone. The Explorer, meanwhile, can destroy a coal cart for an instant +5 mana, effectively handing his teammate a tower out of thin air. Cooperation stopped being encouraged and became unavoidable.

<figure><img src="Asset/Picture/CC/User%20Flow/coop%20loop.png" alt="Co-op dependency loop"><figcaption>The co-op dependency loop</figcaption></figure>

<strong class="d-h3">Designing VR for the first time</strong>
This was the team's first VR project. We cut all melee weapons (no physical feedback makes swinging feel terrible), kept enemies primarily ranged, removed jumping and added a movement vignette against motion sickness, and used ramps instead of stairs with open sightlines to keep the space readable in a headset.

<div class="detail-fig-grid"><figure><img src="Asset/Picture/CC/Enemy/Enemy-1.png" alt="Enemy design 1"><figcaption>Enemy · Ranged behaviour</figcaption></figure><figure><img src="Asset/Picture/CC/Enemy/Enemy-2.png" alt="Enemy design 2"><figcaption>Enemy · Approach &amp; timing</figcaption></figure></div>

<strong class="d-h2">Level Design</strong>
I was designing space, not layout. Three levels, each escalating from the last.

<strong class="d-h3">Level 1 — Learning the roles</strong>
Clear sightlines, resources next to spawn, enemies from a single direction. There is almost no real challenge — the only thing players need to figure out is who they are and how resources flow between them.

<div class="detail-fig-grid"><figure><img src="Asset/Picture/CC/Level/Level%201-1.png" alt="Level 1 overview 1"></figure><figure><img src="Asset/Picture/CC/Level/Level%201-2.png" alt="Level 1 overview 2"></figure></div>

<figure><img src="Asset/Picture/CC/Level/Level%201-Design.png" alt="Level 1 design"><figcaption>Level 1 · Design</figcaption></figure>

<figure><img src="Asset/Picture/CC/Level/Level%201-Combat%20Design.png" alt="Level 1 combat design"><figcaption>Level 1 · Combat Design</figcaption></figure>

<strong class="d-h3">Level 2 — Elevation and pressure from two sides</strong>
The map expands, elevation is introduced, resources scatter further out, and enemies enter through two adjacent entrances. Players handle two things at once, and scattered resources start pulling the two players apart.

<figure><img src="Asset/Picture/CC/Level/Level%202-1.png" alt="Level 2 overview"></figure>

<figure><img src="Asset/Picture/CC/Level/Level%202-Design.png" alt="Level 2 design"><figcaption>Level 2 · Design</figcaption></figure>

<figure><img src="Asset/Picture/CC/Level/Level%202-Combat%20Design.png" alt="Level 2 combat design"><figcaption>Level 2 · Combat Design</figcaption></figure>

<strong class="d-h3">Level 3 — Coordination with the Strategist at the center</strong>
The map opens up, the two entrances push to opposite corners, and enemies take a semicircular route in. The Explorer can no longer cover both entrances alone — he has to rely on the Strategist's overhead view and the Strategist has to actually speak up. What this level tests isn't mechanical skill, it's communication.

<div class="detail-fig-grid"><figure><img src="Asset/Picture/CC/Level/Level%203-1.png" alt="Level 3 overview 1"></figure><figure><img src="Asset/Picture/CC/Level/Level%203-2.png" alt="Level 3 overview 2"></figure></div>

<figure><img src="Asset/Picture/CC/Level/Level%203-Design.png" alt="Level 3 design"><figcaption>Level 3 · Design</figcaption></figure>

<figure><img src="Asset/Picture/CC/Level/Level%203-Combat%20Design.png" alt="Level 3 combat design"><figcaption>Level 3 · Combat Design</figcaption></figure>

What changes across Level 2 and 3 isn't entrance count — it's the distance between them. That single change forces the Explorer to give up handling everything himself and start taking direction. Cooperation is no longer a strategic option; it's the only way through.

<strong class="d-h3">The level we threw away</strong>
The original Level 3 had the most aggressive elevation in the project — multiple platforms, dramatic drops, a genuinely striking 3D battlefield on paper. Playtesting gave a clear answer: it doesn't work. Players fell into pits they couldn't climb out of, footing was unreliable, and sharp elevation changes made people dizzy in the headset. We had assumed players would be as VR-tolerant as we were. We threw the level out and moved complexity from the vertical axis to the horizontal one — challenge from distance rather than height. We lost the more visually ambitious level and got, in return, a level players are actually willing to finish.

<figure><img src="Asset/Picture/CC/Level/old%20level.png" alt="The discarded high-elevation Level 3"><figcaption>The discarded Level 3 — the high-elevation version we cut</figcaption></figure>

<strong class="d-h2">Designed Beyond Scope</strong>
Systems designed but cut for time within a hard 3-month ceiling. The alternating puzzle/combat concept was rejected by the client, but its design goal — give each side something they must be doing — carried through into the resource-dependency solution.

<strong class="d-h3">Room Rotation</strong>
The Strategist could physically grab and rotate an entire room while the Explorer simply perceived the environment changing. This is where the map arrangement itself becomes a tool the Strategist wields to reshape the battlefield.

<div class="detail-fig-grid"><figure><img src="Asset/Picture/CC/Extend/Map%20Arrangement-1.jpg" alt="Map arrangement 1"><figcaption>Map Arrangement · 1</figcaption></figure><figure><img src="Asset/Picture/CC/Extend/Map%20Arrangement-2.jpg" alt="Map arrangement 2"><figcaption>Map Arrangement · 2</figcaption></figure></div>

<figure><img src="Asset/Picture/CC/Extend/Map%20Arrangement-3.jpg" alt="Map arrangement 3"><figcaption>Map Arrangement · 3</figcaption></figure>

<strong class="d-h3">Fog of War</strong>
The Strategist's "god's-eye view" would only reveal what the Explorer had physically walked — every inch of visible battlefield earned by exploration.

<div class="detail-fig-grid"><figure><img src="Asset/Picture/CC/Extend/Fog%20of%20War-1.jpg" alt="Fog of war 1"><figcaption>Fog of War · 1</figcaption></figure><figure><img src="Asset/Picture/CC/Extend/Fog%20of%20War-2.jpg" alt="Fog of war 2"><figcaption>Fog of War · 2</figcaption></figure></div>

<strong class="d-h3">Boss Encounter</strong>
A two-phase fight with a stun/regen risk-reward loop. Room Rotation, Fog of War and the Boss all needed cross-player state sync and more iteration time than three months allowed.

<div class="detail-gif"><video src="Asset/Video/BossAttackAlternative.mp4" autoplay muted loop playsinline></video></div>

<strong class="d-h2">Reflection</strong>
I'm proudest of the Level 3 rebuild — moving complexity from vertical to horizontal was the moment I understood that level design isn't about designing space, it's about designing what players will do. I'd have pushed harder, earlier, on what the client actually wanted: when a client says their ideas don't matter, that's not the end of the conversation. On a client project, silence doesn't mean there are no requirements.

/* ── State ── */
let activeCategory = null;
let currentIndex = 0;
const panel    = document.getElementById('cat-panel');
const backdrop = document.getElementById('backdrop');
const track    = document.getElementById('carousel-track');
const dotsRow  = document.getElementById('dots-row');
const prevBtn  = document.getElementById('prev-btn');
const nextBtn  = document.getElementById('next-btn');
const detail   = document.getElementById('detail-overlay');

/* ── Cursor ── */
const cursor = document.getElementById('cursor');
window.addEventListener('mousemove', e => {
    gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.22, ease: 'power2.out' });
});
window.addEventListener('mousedown', () => gsap.to(cursor, { scale: 2.2, duration: 0.1 }));
window.addEventListener('mouseup',   () => gsap.to(cursor, { scale: 1,   duration: 0.18 }));

/* ── Open panel ── */
function openPanel(catKey) {
    const cat = CATEGORIES[catKey];
    activeCategory = catKey;
    currentIndex = 0;

    // Always reset the carousel back to the first project. Disable the
    // slide transition for the reset so it doesn't visibly rewind.
    track.style.transition = 'none';
    track.style.transform = 'translateX(0)';
    requestAnimationFrame(() => { track.style.transition = ''; });

    // Header
    const label = document.getElementById('panel-cat-label');
    const title = document.getElementById('panel-title');
    label.textContent = 'Category ' + cat.num;
    label.style.color = cat.accent;
    title.textContent = cat.label;

    // Build slides
    track.innerHTML = '';
    dotsRow.innerHTML = '';
    cat.projects.forEach((p, i) => {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        slide.innerHTML = `
            <div class="project-thumb" onclick="openDetail('${catKey}',${i})">
                <div class="thumb-img" style="background:${p.cover ? '#0d1117' : p.imgBg}">${p.cover ? `<video src="${p.cover}" autoplay muted loop playsinline data-slow></video>` : p.emoji}</div>
                <div class="thumb-body">
                    <div class="thumb-tags">
                        ${p.tags.map(t => `<span class="tag" style="${cat.tagStyle}">${t}</span>`).join('')}
                    </div>
                    <div class="thumb-title">${p.title}</div>
                    <div class="thumb-desc">${p.desc}</div>
                    <div class="thumb-cta">
                      <span class="thumb-cta-btn" style="color:${cat.accent}">
                        查看详情
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                      </span>
                    </div>
                </div>
            </div>`;
        track.appendChild(slide);

        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.style.background = i === 0 ? cat.accent : '';
        dot.onclick = () => goToSlide(i);
        dotsRow.appendChild(dot);
    });

    updateArrows();
    slowCoverVideos();
    panel.classList.add('open');
    backdrop.classList.add('visible');
    document.body.style.overflow = 'hidden';
}

/* Cover videos play at normal (native) speed. */
const COVER_SPEED = 1;
function slowCoverVideos() {
    document.querySelectorAll('video[data-slow]').forEach(v => {
        v.playbackRate = COVER_SPEED;
        if (!v.dataset.slowBound) {
            v.dataset.slowBound = '1';
            v.addEventListener('loadedmetadata', () => { v.playbackRate = COVER_SPEED; });
            v.addEventListener('play', () => { v.playbackRate = COVER_SPEED; });
        }
    });
}

/* ── Close panel ── */
function closePanel() {
    panel.classList.remove('open');
    backdrop.classList.remove('visible');
    document.body.style.overflow = '';
}

/* ── Slide ── */
function slide(dir) {
    const cat = CATEGORIES[activeCategory];
    const newIdx = currentIndex + dir;
    if (newIdx < 0 || newIdx >= cat.projects.length) return;
    goToSlide(newIdx);
}

function goToSlide(idx) {
    const cat = CATEGORIES[activeCategory];
    currentIndex = idx;
    track.style.transform = `translateX(-${idx * 62}%)`;

    // update dots
    const dots = dotsRow.querySelectorAll('.dot');
    dots.forEach((d, i) => {
        d.classList.toggle('active', i === idx);
        d.style.background = i === idx ? cat.accent : 'rgba(255,255,255,0.18)';
        d.style.width = i === idx ? '20px' : '6px';
    });
    updateArrows();
}

function updateArrows() {
    const len = CATEGORIES[activeCategory]?.projects.length ?? 0;
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === len - 1;
}

/* ── Open detail ── */
function openDetail(catKey, idx) {
    const cat = CATEGORIES[catKey];
    const p = cat.projects[idx];

    // top cover — video if provided, otherwise emoji on a gradient
    const detailImg = document.getElementById('detail-img');
    if (p.cover) {
        detailImg.style.background = '#0d1117';
        detailImg.innerHTML = `<video src="${p.cover}" autoplay muted loop playsinline data-slow></video>`;
        slowCoverVideos();
    } else {
        detailImg.style.background = p.imgBg;
        detailImg.textContent = p.emoji;
    }

    document.getElementById('detail-title').textContent = p.title;

    // trailer directly under the title
    const trailerEl = document.getElementById('detail-trailer');
    if (p.trailer) {
        trailerEl.style.display = '';
        const ytId = youtubeId(p.trailer);
        if (ytId) {
            trailerEl.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}" title="Trailer" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
        } else {
            trailerEl.innerHTML = `<video src="${p.trailer}" controls playsinline preload="metadata"></video>`;
        }
    } else {
        trailerEl.style.display = 'none';
        trailerEl.innerHTML = '';
    }

    // description — split on blank lines; pass block-level HTML through
    // untouched so embedded figures/headers aren't broken by <br> insertion.
    document.getElementById('detail-desc').innerHTML = p.fullDesc.trim()
        .split(/\n\n+/)
        .map(block => {
            const t = block.trim();
            if (t.startsWith('<')) return t;
            return `<p style="margin:0 0 14px;">${t.replace(/\n/g, '<br>')}</p>`;
        })
        .join('');

    // tags
    const tagsEl = document.getElementById('detail-tags');
    tagsEl.innerHTML = p.tags.map(t => `<span class="tag" style="${cat.tagStyle}">${t}</span>`).join('');

    // links
    const linksEl = document.getElementById('detail-links');
    const linksLabel = document.getElementById('detail-links-label');
    if (p.links && p.links.length) {
        linksLabel.style.display = '';
        linksEl.innerHTML = p.links.map(l =>
            `<a class="detail-link" href="${l.href}">${l.label}</a>`
        ).join('');
    } else {
        linksLabel.style.display = 'none';
        linksEl.innerHTML = '';
    }

    // back button action
    document.getElementById('detail-back-btn').onclick = closeDetail;

    detail.scrollTop = 0;
    detail.classList.add('open');
}

function closeDetail() {
    detail.classList.remove('open');
    // stop the trailer so its audio doesn't keep playing behind the panel
    const tv = document.querySelector('#detail-trailer video');
    if (tv) tv.pause();
    // reload the YouTube iframe to halt playback
    const yt = document.querySelector('#detail-trailer iframe');
    if (yt) yt.src = yt.src;
}

/* Extract a YouTube video id from youtu.be / youtube.com URLs. */
function youtubeId(url) {
    const m = String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
    return m ? m[1] : null;
}

/* ── Keyboard ── */
window.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        if (detail.classList.contains('open')) closeDetail();
        else closePanel();
    }
    if (panel.classList.contains('open') && !detail.classList.contains('open')) {
        if (e.key === 'ArrowLeft')  slide(-1);
        if (e.key === 'ArrowRight') slide(1);
    }
});

/* ── Touch swipe on carousel ── */
let touchStartX = 0;
track.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
track.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) slide(dx < 0 ? 1 : -1);
});
</script>
