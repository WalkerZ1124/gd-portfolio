<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的可交互作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 1. 引入 GSAP 动画库和 Vanilla-Tilt 3D 倾斜库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

    <style>
        html { scroll-behavior: smooth; }
        /* 自定义光标样式：让它有种霓虹流光感 */
        .custom-cursor {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, rgba(45,212,191,0.8) 0%, rgba(45,212,191,0) 70%);
            border: 2px solid #2dd4bf;
            position: fixed;
            border-radius: 50%;
            pointer-events: none; /* 确保不挡住鼠标点击 */
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: screen;
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-200 font-sans overflow-x-hidden">

    <!-- 2. 交互元素：自定义跟随鼠标的流光圆圈 -->
    <div class="custom-cursor" id="cursor"></div>

    <nav class="sticky top-0 z-50 backdrop-blur-md bg-[#0b0f19]/70 border-b border-slate-800/80 px-6 py-4 flex justify-between items-center">
        <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-teal-400 to-emerald-400 bg-clip-text text-transparent">INTERACTIVE.DEV</span>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-24 text-center space-y-12">
        <h1 class="text-4xl md:text-6xl font-extrabold text-white">
            动效完全由 <span class="text-teal-400">GPU 硬件加速</span> 驱动
        </h1>
        <p class="text-slate-400 max-w-xl mx-auto">
            把你的鼠标移到下方的卡片上晃动一下，体验 3D 倾斜反馈。同时注意看你的鼠标指针。
        </p>

        <!-- 3. 交互元素：带 3D 倾斜的便当盒卡片 -->
        <!-- 注意看这里的 data-tilt 和 data-tilt-max -->
        <div data-tilt data-tilt-max="15" data-tilt-glare data-tilt-max-glare="0.3" 
             class="bg-slate-900/50 border border-slate-800 p-12 rounded-3xl h-64 flex flex-col justify-center items-center cursor-pointer shadow-2xl transition-shadow hover:shadow-teal-500/5">
            <h3 class="text-2xl font-bold text-white mb-2">💻 3D 交互卡片</h3>
            <p class="text-sm text-teal-400 font-mono">Vanilla-Tilt.js 驱动</p>
        </div>
    </main>

    <!-- 4. 编写交互逻辑的 JS 代码 -->
    <script>
        // 【交互一：丝滑的鼠标跟随动画】
        const cursor = document.getElementById('cursor');
        
        // 监听整个网页的鼠标移动事件
        window.addEventListener('mousemove', (e) => {
            // 使用 GSAP 让光标平滑地“追赶”鼠标，制造出一种带有物理惯性的丝滑感，完全不卡
            gsap.to(cursor, {
                x: e.clientX,
                y: e.clientY,
                duration: 0.3, // 延迟追随的时间，数字越大拖尾越长
                ease: "power2.out"
            });
        });

        // 【交互二：鼠标点下去时的反馈】
        window.addEventListener('mousedown', () => {
            gsap.to(cursor, { scale: 1.5, backgroundColor: "rgba(45,212,191,0.4)", duration: 0.1 });
        });
        window.addEventListener('mouseup', () => {
            gsap.to(cursor, { scale: 1, backgroundColor: "transparent", duration: 0.2 });
        });
    </script>
</body>
</html>
